    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cartCounter = document.getElementById('cart-counter');
            
            // Dynamic Theme Controller Logic
            const themeToggleBtn = document.getElementById('theme-mode-toggle');
            const themeToggleIcon = document.getElementById('theme-toggle-icon');
            
            function configureThemeOnLoad() {
                const storedTheme = localStorage.getItem('as_group_theme') || 'light';
                document.documentElement.setAttribute('data-bs-theme', storedTheme);
                if (storedTheme === 'dark') {
                    themeToggleIcon.className = 'bi bi-sun';
                } else {
                    themeToggleIcon.className = 'bi bi-moon-stars';
                }
            }
            
            themeToggleBtn.addEventListener('click', function() {
                let currentTheme = document.documentElement.getAttribute('data-bs-theme');
                let nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-bs-theme', nextTheme);
                localStorage.setItem('as_group_theme', nextTheme);
                
                if (nextTheme === 'dark') {
                    themeToggleIcon.className = 'bi bi-sun';
                } else {
                    themeToggleIcon.className = 'bi bi-moon-stars';
                }
            });

            // Notification Mechanism Setup
            const notifTrigger = document.getElementById('btn-notification-trigger');
            const notifDot = document.getElementById('notif-dot');
            const toastEl = document.getElementById('notification-toast');
            const toastBodyContent = document.getElementById('toast-body-content');
            const bootstrapToast = new bootstrap.Toast(toastEl);

            notifTrigger.addEventListener('click', function() {
                let cart = JSON.parse(localStorage.getItem('as_group_cart')) || [];
                if(cart.length > 0) {
                    toastBodyContent.innerHTML = `You have <b>${cart.length} unique batches</b> sitting in your cart ready for procurement.`;
                } else {
                    toastBodyContent.innerHTML = "No alerts found. Your corporate account setup is up-to-date.";
                }
                bootstrapToast.show();
                notifDot.style.display = 'none';
            });

            // Basket Counter Syncer
            function updateHeaderBadge() {
                let cart = JSON.parse(localStorage.getItem('as_group_cart')) || [];
                let totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
                cartCounter.textContent = totalItems;
            }
            
            configureThemeOnLoad();
            updateHeaderBadge();
        });
    </script>
